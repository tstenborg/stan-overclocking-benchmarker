---
name: super-linter

# The appended comment, below, disables overzealous warnings about the unquoted
# "on" by super-linter's YAML linter, yamllint.
on: # yamllint disable-line rule:truthy
  push: null
  pull_request: null

permissions: {}

jobs:
  build:
    name: super-linter
    runs-on: ubuntu-latest

    permissions:
      # "contents" permission to clone the repository.
      contents: read
      packages: read
      # "issues" and "pull-requests" permissions to write results as pull
      # request comments. Omit them if you don't need summary comments.
      issues: write
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status.
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # super-linter needs the full git history to get the
          # list of files that changed across commits.
          fetch-depth: 0
          persist-credentials: false

      - name: Super-linter
        uses: super-linter/super-linter@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          # To report GitHub Actions status checks.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
